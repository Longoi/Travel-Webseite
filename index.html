<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thuy Lien Tran – Tư Vấn Du Lịch</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:       #C9A96E;
      --gold-light: #E8D5A3;
      --gold-pale:  #F5EDD8;
      --dark:       #1A1410;
      --dark-mid:   #2D2218;
      --cream:      #FAF6EE;
      --text:       #3A2E22;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Barlow', sans-serif; font-weight: 300; background: var(--cream); color: var(--text); overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

    /* LANGUAGE BAR */
    .lang-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: flex-end; align-items: center; padding: 10px 32px; background: rgba(26,20,16,0.93); backdrop-filter: blur(12px); }
    .lang-btn { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; padding: 6px 16px; border: 1px solid rgba(201,169,110,0.3); background: transparent; color: rgba(201,169,110,0.6); cursor: pointer; transition: all 0.3s; }
    .lang-btn:first-child { border-radius: 3px 0 0 3px; }
    .lang-btn:last-child  { border-radius: 0 3px 3px 0; }
    .lang-btn.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }
    .lang-btn:hover:not(.active) { color: var(--gold); border-color: var(--gold); }

    /* HERO */
    .hero { min-height: 100vh; position: relative; display: flex; align-items: center; overflow: hidden; background: var(--dark); }
    .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 70% 50%, rgba(201,169,110,0.08) 0%, transparent 60%), radial-gradient(ellipse 50% 80% at 20% 80%, rgba(45,106,79,0.06) 0%, transparent 50%), linear-gradient(135deg, #1A1410 0%, #2D2218 50%, #1A1410 100%); }
    .lotus-bg { position: absolute; right: -80px; top: 50%; transform: translateY(-50%); width: 700px; height: 700px; opacity: 0.04; pointer-events: none; }
    .filigree-left { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, transparent, var(--gold) 30%, var(--gold) 70%, transparent); opacity: 0.4; }
    .hero-inner { position: relative; z-index: 2; width: 100%; max-width: 1200px; margin: 0 auto; padding: 120px 60px 80px; display: grid; grid-template-columns: 1fr 400px; gap: 80px; align-items: center; }
    .hero-eyebrow { font-size: 10px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 24px; opacity: 0; animation: fadeUp 0.8s ease 0.2s forwards; }
    .hero-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(52px, 7vw, 88px); font-weight: 300; line-height: 1; color: var(--cream); margin-bottom: 8px; opacity: 0; animation: fadeUp 0.8s ease 0.35s forwards; }
    .hero-name em { font-style: italic; color: var(--gold); }
    .hero-tagline { font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 2vw, 22px); font-weight: 300; font-style: italic; color: rgba(250,246,238,0.6); margin-bottom: 40px; opacity: 0; animation: fadeUp 0.8s ease 0.5s forwards; }
    .hero-divider { width: 60px; height: 1px; background: var(--gold); margin-bottom: 32px; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards; }
    .hero-desc { font-size: 15px; line-height: 1.8; color: rgba(250,246,238,0.7); max-width: 520px; margin-bottom: 48px; opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards; }
    .hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.8s ease 0.9s forwards; }
    .btn-primary { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; padding: 16px 36px; background: var(--gold); color: var(--dark); border: none; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s; position: relative; overflow: hidden; }
    .btn-primary::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.15); transform: translateX(-110%) skewX(-15deg); transition: transform 0.4s; }
    .btn-primary:hover::after { transform: translateX(110%) skewX(-15deg); }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(201,169,110,0.3); }
    .btn-outline { font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; padding: 16px 36px; background: transparent; color: var(--gold); border: 1px solid rgba(201,169,110,0.5); cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.3s; }
    .btn-outline:hover { background: rgba(201,169,110,0.1); border-color: var(--gold); transform: translateY(-1px); }

    /* HERO PHOTO */
    .hero-photo-wrap { position: relative; opacity: 0; animation: fadeIn 1s ease 0.5s forwards; }
    .hero-photo-wrap::before { content: ''; position: absolute; top: -20px; right: -20px; width: 100%; height: 100%; border: 1px solid rgba(201,169,110,0.25); pointer-events: none; }
    .hero-photo-wrap::after  { content: ''; position: absolute; bottom: -20px; left: -20px; width: 100%; height: 100%; border: 1px solid rgba(201,169,110,0.15); pointer-events: none; }
    .hero-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; object-position: top; display: block; filter: sepia(8%) contrast(1.05); }
    .photo-badge { position: absolute; bottom: 24px; left: -24px; background: var(--gold); color: var(--dark); padding: 16px 20px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 500; line-height: 1.6; }

    /* LANGUAGES STRIP */
    .langs-strip { background: var(--dark-mid); padding: 20px 60px; display: flex; align-items: center; justify-content: center; gap: 40px; }
    .langs-strip-label { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(201,169,110,0.5); }
    .langs-strip-items { display: flex; gap: 32px; }
    .lang-flag { font-size: 13px; letter-spacing: 0.15em; color: var(--gold-light); font-weight: 400; display: flex; align-items: center; gap: 8px; }
    .lang-flag span { font-size: 18px; }

    /* SHARED */
    .section { padding: 100px 60px; }
    .section-inner { max-width: 1200px; margin: 0 auto; }
    .section-label { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5vw, 60px); font-weight: 300; line-height: 1.1; color: var(--dark); margin-bottom: 32px; }
    .section-title em { font-style: italic; color: var(--gold); }
    .ornament { display: flex; align-items: center; gap: 12px; margin: 24px 0 40px; }
    .ornament-line { flex: 1; height: 1px; background: rgba(201,169,110,0.2); }
    .ornament-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); flex-shrink: 0; }

    /* ABOUT */
    .about-section { background: var(--cream); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .about-text p { font-size: 15px; line-height: 1.9; color: #5A4A3A; margin-bottom: 20px; }
    .about-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: rgba(201,169,110,0.15); margin-top: 48px; }
    .stat-box { background: var(--cream); padding: 28px 24px; text-align: center; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 48px; font-weight: 300; color: var(--gold); line-height: 1; margin-bottom: 6px; }
    .stat-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: #9A8070; }
    .about-visual { position: relative; }
    .about-img-container { position: relative; overflow: hidden; }
    .about-img-container img { width: 100%; aspect-ratio: 4/5; object-fit: cover; object-position: top; filter: sepia(5%) contrast(1.05); display: block; transition: transform 6s ease; }
    .about-img-container:hover img { transform: scale(1.04); }
    .about-img-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(26,20,16,0.3) 0%, transparent 50%); }
    .corner-tl, .corner-br { position: absolute; width: 40px; height: 40px; pointer-events: none; }
    .corner-tl { top: -8px; left: -8px; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .corner-br { bottom: -8px; right: -8px; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* SERVICES */
    .services-section { background: var(--dark); position: relative; overflow: hidden; }
    .services-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 60% at 80% 50%, rgba(201,169,110,0.06) 0%, transparent 60%); }
    .services-section .section-title { color: var(--cream); }
    .services-intro { font-size: 15px; line-height: 1.8; color: rgba(250,246,238,0.6); max-width: 580px; margin-bottom: 60px; }
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(201,169,110,0.12); }
    .service-card { background: var(--dark); padding: 40px 32px; position: relative; overflow: hidden; transition: background 0.4s; }
    .service-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s; }
    .service-card:hover { background: rgba(201,169,110,0.05); }
    .service-card:hover::before { transform: scaleX(1); }
    .service-icon { font-size: 28px; margin-bottom: 20px; display: block; }
    .service-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--cream); margin-bottom: 12px; }
    .service-desc { font-size: 13px; line-height: 1.7; color: rgba(250,246,238,0.5); }

    /* WHY ME */
    .why-section { background: var(--gold-pale); }
    .why-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; margin-top: 60px; }
    .why-item { padding: 32px; background: white; border-bottom: 3px solid transparent; transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s; }
    .why-item:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 20px 60px rgba(201,169,110,0.15); }
    .why-icon { width: 48px; height: 48px; background: var(--gold-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 20px; }
    .why-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; color: var(--dark); margin-bottom: 10px; }
    .why-text { font-size: 13px; line-height: 1.7; color: #6A5A4A; }

    /* CONTACT */
    .contact-section { background: var(--dark); position: relative; overflow: hidden; }
    .contact-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 40% 50% at 10% 50%, rgba(45,106,79,0.08) 0%, transparent 60%), radial-gradient(ellipse 60% 60% at 90% 20%, rgba(201,169,110,0.06) 0%, transparent 60%); }
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; position: relative; z-index: 1; }
    .contact-info .section-title { color: var(--cream); }
    .contact-info .section-label { color: var(--gold); }
    .contact-intro { font-size: 15px; line-height: 1.8; color: rgba(250,246,238,0.6); margin-bottom: 40px; }
    .contact-details { display: flex; flex-direction: column; gap: 20px; }
    .contact-item { display: flex; align-items: flex-start; gap: 16px; padding: 20px; border: 1px solid rgba(201,169,110,0.12); transition: border-color 0.3s, background 0.3s; text-decoration: none; color: inherit; }
    .contact-item:hover { border-color: rgba(201,169,110,0.4); background: rgba(201,169,110,0.04); }
    .contact-item-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
    .contact-item-label { font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
    .contact-item-val { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--cream); }

    /* FORM */
    .contact-form-wrap { background: rgba(250,246,238,0.03); border: 1px solid rgba(201,169,110,0.12); padding: 48px 40px; }
    .form-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; color: var(--cream); margin-bottom: 32px; }
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .form-input, .form-textarea, .form-select { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,169,110,0.2); color: var(--cream); padding: 14px 16px; font-family: 'Barlow', sans-serif; font-size: 14px; font-weight: 300; outline: none; transition: border-color 0.3s, background 0.3s; appearance: none; }
    .form-input::placeholder, .form-textarea::placeholder { color: rgba(250,246,238,0.25); }
    .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--gold); background: rgba(201,169,110,0.05); }
    .form-select option { background: var(--dark-mid); color: var(--cream); }
    .form-textarea { resize: vertical; min-height: 120px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-submit { width: 100%; padding: 18px; background: var(--gold); color: var(--dark); border: none; font-family: 'Barlow', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer; transition: all 0.3s; }
    .form-submit:hover { background: var(--gold-light); transform: translateY(-1px); box-shadow: 0 8px 32px rgba(201,169,110,0.25); }
    .form-success { display: none; text-align: center; padding: 40px 20px; color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 22px; font-style: italic; }

    /* FOOTER */
    footer { background: var(--dark); border-top: 1px solid rgba(201,169,110,0.1); padding: 40px 60px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    .footer-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 300; color: var(--gold); }
    .footer-copy { font-size: 12px; color: rgba(250,246,238,0.3); letter-spacing: 0.05em; }
    .footer-drv { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(201,169,110,0.5); border: 1px solid rgba(201,169,110,0.2); padding: 6px 14px; }

    /* WHATSAPP */
    .wa-float { position: fixed; bottom: 32px; right: 32px; z-index: 999; width: 60px; height: 60px; border-radius: 50%; background: #25D366; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: all 0.3s; animation: pulse 2s ease infinite; }
    .wa-float:hover { transform: scale(1.1) translateY(-2px); box-shadow: 0 8px 30px rgba(37,211,102,0.5); }

    /* REVEAL */
    .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* KEYFRAMES */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pulse { 0%,100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); } 50% { box-shadow: 0 4px 30px rgba(37,211,102,0.7); } }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; padding: 100px 28px 60px; gap: 48px; }
      .hero-photo-wrap { max-width: 320px; margin: 0 auto; }
      .hero-photo-wrap::before, .hero-photo-wrap::after { display: none; }
      .about-grid, .contact-grid { grid-template-columns: 1fr; gap: 48px; }
      .services-grid, .why-grid { grid-template-columns: 1fr; }
      .section { padding: 70px 28px; }
      .langs-strip { flex-direction: column; gap: 16px; padding: 20px 28px; }
      footer { flex-direction: column; align-items: flex-start; padding: 32px 28px; }
      .form-row { grid-template-columns: 1fr; }
      .contact-form-wrap { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<!-- LANGUAGE BAR -->
<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('vi')" id="btn-vi">🇻🇳 Tiếng Việt</button>
  <button class="lang-btn"        onclick="setLang('de')" id="btn-de">🇩🇪 Deutsch</button>
  <button class="lang-btn"        onclick="setLang('en')" id="btn-en">🇬🇧 English</button>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="filigree-left"></div>
  <svg class="lotus-bg" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="250" cy="250" r="200" stroke="white" stroke-width="1"/>
    <circle cx="250" cy="250" r="150" stroke="white" stroke-width="0.5"/>
    <circle cx="250" cy="250" r="100" stroke="white" stroke-width="0.5"/>
    <path d="M250 50 Q280 150 250 250 Q220 150 250 50Z" stroke="white" stroke-width="1"/>
    <path d="M250 450 Q280 350 250 250 Q220 350 250 450Z" stroke="white" stroke-width="1"/>
    <path d="M50 250 Q150 280 250 250 Q150 220 50 250Z" stroke="white" stroke-width="1"/>
    <path d="M450 250 Q350 280 250 250 Q350 220 450 250Z" stroke="white" stroke-width="1"/>
    <path d="M108 108 Q190 190 250 250 Q190 190 108 108Z" stroke="white" stroke-width="1"/>
    <path d="M392 108 Q310 190 250 250 Q310 190 392 108Z" stroke="white" stroke-width="1"/>
    <path d="M108 392 Q190 310 250 250 Q190 310 108 392Z" stroke="white" stroke-width="1"/>
    <path d="M392 392 Q310 310 250 250 Q310 310 392 392Z" stroke="white" stroke-width="1"/>
    <circle cx="250" cy="250" r="20" stroke="white" stroke-width="1"/>
    <circle cx="250" cy="250" r="6" fill="white" opacity="0.5"/>
  </svg>
  <div class="hero-inner">
    <div class="hero-text">
      <p class="hero-eyebrow" data-vi="Tư Vấn Du Lịch Cá Nhân" data-de="Persönliche Reiseberatung" data-en="Personal Travel Consultant"></p>
      <h1 class="hero-name">Thuy Lien <em>Tran</em></h1>
      <p class="hero-tagline" data-vi="Hành trình của bạn — được lên kế hoạch với tâm huyết" data-de="Ihre Reise — mit Herzblut geplant" data-en="Your journey — planned with heart"></p>
      <div class="hero-divider"></div>
      <p class="hero-desc"
         data-vi="Với nhiều năm kinh nghiệm và niềm đam mê du lịch, tôi giúp bạn tìm chuyến đi hoàn hảo — từ nghỉ dưỡng trọn gói đến du thuyền sang trọng, từ hành trình khám phá đến tour vòng quanh thế giới. Tôi đồng hành cùng bạn trước, trong và sau chuyến đi."
         data-de="Mit jahrelanger Erfahrung und echter Reiseleidenschaft finde ich für Sie die perfekte Reise – von Pauschalreisen bis Kreuzfahrten, von Erlebnistouren bis Weltreisen. Ich begleite Sie vor, während und nach der Reise."
         data-en="With years of experience and a genuine passion for travel, I help you find the perfect trip — from package holidays to luxury cruises, adventure tours to round-the-world journeys. I'm here before, during, and after your trip."></p>
      <div class="hero-ctas">
        <a href="#contact" class="btn-primary" data-vi="Liên Hệ Ngay" data-de="Jetzt Anfragen" data-en="Get in Touch"></a>
        <a href="#services" class="btn-outline" data-vi="Xem Dịch Vụ" data-de="Leistungen" data-en="Our Services"></a>
      </div>

<section class="section about-section" id="about">
  <div class="section-inner">
    <div class="about-grid">
      <div class="about-text reveal">
        <p class="section-label" data-vi="Về Tôi" data-de="Über Mich" data-en="About Me"></p>
        <h2 class="section-title" data-vi="Người Bạn Đồng Hành <em>Đáng Tin Cậy</em>" data-de="Ihre vertrauensvolle <em>Reisepartnerin</em>" data-en="Your Trusted <em>Travel Partner</em>"></h2>
        <div class="ornament"><div class="ornament-line"></div><div class="ornament-diamond"></div><div class="ornament-line"></div></div>
        <p data-vi="Xin chào! Tôi là Thuy Lien Tran — tư vấn viên du lịch với niềm đam mê bất tận với những chuyến khám phá thế giới. Sinh sống tại Bad Saulgau, tôi phục vụ khách hàng trên toàn nước Đức và có thể tư vấn bằng bốn ngôn ngữ: Việt, Đức, Anh và Nga."
           data-de="Hallo! Ich bin Thuy Lien Tran – Reiseberaterin mit einer unendlichen Leidenschaft für das Entdecken der Welt. Ich lebe in Bad Saulgau und betreue Kunden in ganz Deutschland auf Vietnamesisch, Deutsch, Englisch und Russisch."
           data-en="Hello! I'm Thuy Lien Tran — a travel consultant with an endless passion for exploring the world. Based in Bad Saulgau, I serve clients across Germany and can advise in four languages: Vietnamese, German, English and Russian."></p>
        <p style="margin-top:16px"
           data-vi="Tôi tin rằng mỗi chuyến đi là một câu chuyện riêng. Vì vậy, tôi dành thời gian lắng nghe ước mơ của bạn để tạo ra hành trình phù hợp nhất — từ kỳ nghỉ gia đình ấm áp đến cuộc phiêu lưu cá nhân."
           data-de="Ich glaube, dass jede Reise ihre eigene Geschichte hat. Deshalb nehme ich mir Zeit, Ihren Wunschurlaub zu verstehen und die perfekte Reise zu gestalten – ob Familienurlaub oder Abenteuerreise."
           data-en="I believe every trip is its own story. That's why I take time to listen to your dreams and craft the journey that suits you best — from warm family holidays to personal adventures."></p>
        <p style="margin-top:16px"
           data-vi="Tôi luôn sẵn sàng hỗ trợ bạn qua WhatsApp — kể cả cuối tuần — trong suốt hành trình của bạn."
           data-de="Ich bin für Sie über WhatsApp erreichbar – auch am Wochenende – vor, während und nach Ihrer Reise."
           data-en="I'm available to support you via WhatsApp — including weekends — before, during and after your journey."></p>

<script>
  let currentLang = 'vi';

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + lang).classList.add('active');
    document.documentElement.lang = lang;
    document.querySelectorAll('[data-' + lang + ']').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
        el.placeholder = val;
      } else if (el.tagName === 'OPTION') {
        el.textContent = val;
      } else {
        el.innerHTML = val;
      }
    });
    document.querySelectorAll('[data-placeholder-' + lang + ']').forEach(el => {
      el.placeholder = el.getAttribute('data-placeholder-' + lang);
    });
    document.querySelectorAll('select option').forEach(opt => {
      const v = opt.getAttribute('data-' + lang);
      if (v) opt.textContent = v;
    });
  }

  setLang('vi');

  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => { if (e.isIntersecting) setTimeout(() => e.target.classList.add('visible'), 100); });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  function handleSubmit(e) {
    e.preventDefault();
    const name     = document.getElementById('fname').value;
    const phone    = document.getElementById('fphone').value;
    const email    = document.getElementById('femail').value;
    const message  = document.getElementById('fmessage').value;
    const tripType = document.getElementById('ftripType').value;
    const tpl = {
      vi: `Xin chào Lien! Tôi là ${name}.\nSĐT: ${phone}\nEmail: ${email}\nLoại tour: ${tripType}\n\n${message}`,
      de: `Hallo Lien! Ich bin ${name}.\nTel: ${phone}\nE-Mail: ${email}\nReiseart: ${tripType}\n\n${message}`,
      en: `Hello Lien! I'm ${name}.\nPhone: ${phone}\nEmail: ${email}\nTrip type: ${tripType}\n\n${message}`
    };
    const waUrl = `https://wa.me/4915227070181?text=${encodeURIComponent(tpl[currentLang] || tpl.vi)}`;
    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('formSuccess').style.display = 'block';
    setLang(currentLang);
    setTimeout(() => window.open(waUrl, '_blank'), 600);
  }
</script>
